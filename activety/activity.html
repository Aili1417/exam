<!-- 邀请新人送会员活动弹窗 -->
<div id="activity-modal" class="modal hidden" data-closeable="false">
    <div class="modal-content">
        <div class="modal-header activity-header">
            <h2><i class="fas fa-gift"></i> 邀请抽奖活动</h2>
            <button id="close-activity" class="close-btn">&times;</button>
        </div>
        <div class="modal-body">
            <!-- 活动导航 -->
            <div class="activity-nav">
                <button id="lottery-tab" class="tab-btn active">
                    <i class="fas fa-dice"></i> 抽奖
                </button>
                <button id="invite-tab" class="tab-btn">
                    <i class="fas fa-user-plus"></i> 邀请
                </button>
            </div>

            <!-- 抽奖界面 -->
            <div id="lottery-section" class="activity-section">
                <!-- 抽奖次数显示 -->
                <div class="lottery-info">
                    <div class="lottery-chances">
                        <span class="chances-label">剩余抽奖次数</span>
                        <span class="chances-count" id="remaining-chances">1</span>
                    </div>
                    <div class="lottery-total">
                        <span class="total-label">累计抽奖次数</span>
                        <span class="total-count" id="total-chances">1</span>
                    </div>
                </div>

                <!-- 抽奖转盘 -->
                <div class="lottery-wheel-container">
                    <div class="lottery-display" id="lottery-display">
                        <div class="display-text" id="display-text">-----</div>
                    </div>
                    <div class="wheel-border"></div>
                </div>

                <!-- 抽奖按钮 -->
                <div class="lottery-action">
                    <button id="start-lottery-btn" class="lottery-btn">
                        <i class="fas fa-play"></i>
                        <span>开始抽奖</span>
                    </button>
                </div>

                <!-- 抽奖记录 -->
                <div class="lottery-records">
                    <h4><i class="fas fa-history"></i> 抽奖记录</h4>
                    <div id="lottery-records-list" class="records-list">
                        <!-- 抽奖记录将在这里显示 -->
                    </div>
                </div>
            </div>

            <!-- 邀请界面 -->
            <div id="invite-section" class="activity-section hidden">
                <!-- 新用户界面 -->
                <div id="new-user-section" class="invite-subsection hidden">
                    <div class="activity-banner">
                        <div class="banner-icon">🎁</div>
                        <h3>欢迎新用户！</h3>
                        <p>输入邀请码，让邀请你的老用户获得会员奖励，您也将获得一次抽奖机会</p>
                    </div>
                    <div class="form-group">
                        <label for="invitation-code-input">
                            <i class="fas fa-key"></i> 邀请码
                        </label>
                        <div class="code-input-group">
                            <input type="text" id="invitation-code-input" placeholder="请输入6位邀请码" maxlength="6">
                            <button type="button" id="submit-invitation-btn" class="primary-btn">
                                <i class="fas fa-check"></i> 提交
                            </button>
                        </div>
                        <small class="input-hint">请输入老用户分享给您的6位邀请码</small>
                    </div>
                </div>

                <!-- 老用户界面 -->
                <div id="old-user-section" class="invite-subsection hidden">
                    <div class="activity-banner old-user">
                        <div class="banner-icon">👑</div>
                        <h3>您的专属邀请码</h3>
                        <p>分享给新用户，成功后双方都可获得抽奖机会</p>
                    </div>
                    <div class="invitation-code-display">
                        <div class="code-label">您的邀请码</div>
                        <div class="code-value" id="user-invitation-code">------</div>
                        <button type="button" id="copy-code-btn" class="secondary-btn">
                            <i class="fas fa-copy"></i> 复制邀请码
                        </button>
                    </div>
                    
                    <!-- 邀请记录 -->
                    <div class="invited-users-list">
                        <h4>
                            <i class="fas fa-users"></i> 
                            邀请记录 
                            <span class="invited-count" id="invited-count">0</span>
                        </h4>
                        <div id="invited-users-container" class="users-container">
                            <!-- 邀请记录将在这里显示 -->
                        </div>
                    </div>
                </div>

                <!-- 活动规则 -->
                <div class="activity-rules">
                    <h4><i class="fas fa-info-circle"></i> 活动说明</h4>
                    <ul>
                        <li>所有用户（新老用户）进入活动都有1次免费抽奖机会</li>
                        <li>成功邀请1个新用户，邀请人和被邀请人各获得1次抽奖机会</li>
                        <li>抽奖5次保底获得1个月会员（系统自动发放）</li>
                        <li>会员奖励实时到账，可在个人中心查看</li>
                        <li>活动最终解释权归平台所有</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
